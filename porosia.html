<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porosia - Thur Handmade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="checkout">

  <div id="site-header"></div>

  <main class="checkout-page">
    <div class="container">
      <h1>Përfundo porosinë</h1>

      <form id="checkout-form" class="checkout-grid">

        <!-- Forma e blerësit -->
        <div class="checkout-form-col">
          <h2 class="form-section-title">Informata e dërgesës</h2>

          <div class="form-group">
            <label for="name">Emri dhe mbiemri *</label>
            <input type="text" id="name" name="name" required autocomplete="name" placeholder="p.sh. Fjolla Krasniqi">
          </div>

          <div class="form-group">
            <label for="phone">Numri i telefonit * <small>(Kosovë)</small></label>
            <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="p.sh. 044 123 456">
            <span class="field-error" id="phone-error"></span>
          </div>

          <div class="form-group">
            <label for="email">Email adresa *</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="p.sh. fjolla@gmail.com">
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="city">Qyteti *</label>
            <select id="city" name="city" required>
              <option value="">Zgjidhni qytetin</option>
              <!-- Qytetet shtohen nga JS -->
            </select>
          </div>

          <div class="form-group">
            <label for="address">Adresa e plotë *</label>
            <input type="text" id="address" name="address" required autocomplete="street-address" placeholder="p.sh. Rr. Agim Ramadani, Nr. 10">
          </div>

          <div class="form-group">
            <label for="notes">Shënime (opsionale)</label>
            <textarea id="notes" name="notes" placeholder="Ndonjë shënim special për porosinë..."></textarea>
          </div>

          <!-- Mënyra e pagesës -->
          <h2 class="form-section-title">Mënyra e pagesës</h2>

          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="cod" checked>
              <div class="payment-label">
                <strong>💵 Pagesë në dorëzim</strong>
                <span>Paguani kur t'ju vijë porosia në derë</span>
              </div>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="transfer">
              <div class="payment-label">
                <strong>🏦 Transfer bankar</strong>
                <span>Transferoni para në llogarinë tonë bankare</span>
              </div>
            </label>
          </div>

          <div class="bank-details" id="bank-details">
            <div id="bank-info"></div>
            <p style="margin-top:.75rem; font-size:.82rem; color:var(--clr-text-light)">
              Pas transferit, porosia do të dërgohet brenda 1-3 ditëve pune.
            </p>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem; padding:1rem; font-size:1.05rem;">
            Dërgo porosinë ->
          </button>
        </div>

        <!-- Përmbledhja e porosisë -->
        <div class="order-summary-card">
          <h2>Porosia juaj</h2>
          <div id="order-items"></div>
          <div class="sum-total">
            <span>Totali</span>
            <span id="s-total">0.00€</span>
          </div>
        </div>

      </form>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

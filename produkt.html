<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkt – Thur Handmade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="product">

  <div id="site-header"></div>

  <main>
    <div class="container">
      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <a href="index.html">Ballina</a>
        <span>›</span>
        <a href="dyqani.html">Dyqani</a>
        <span>›</span>
        <span>Produkti</span>
      </div>

      <!-- Product Detail -->
      <div class="product-detail">
        <div class="pd-gallery">
          <img id="main-image" class="pd-main-img" src="" alt="">
          <div class="pd-thumbs" id="thumbs"></div>
        </div>
        <div class="pd-info">
          <h1 id="p-name"></h1>
          <p class="pd-price" id="p-price"></p>
          <p class="pd-desc" id="p-desc"></p>
          <p class="pd-details" id="p-details"></p>
          <button id="add-to-cart" class="btn btn-primary pd-add">Shto në shportë</button>
          <p class="pd-shipping-note">🚚 Transport falas për porosi mbi 50€</p>
          <p class="pd-shipping-note">💳 Pagesë në dorëzim ose transfer bankar</p>
        </div>
      </div>
    </div>

    <!-- Produkte të ngjashme -->
    <section class="related-section">
      <div class="container">
        <h2 class="section-title">Produkte të tjera</h2>
        <div class="product-grid" id="related-products"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

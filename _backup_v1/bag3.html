<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Tote – THUR</title>
  <!-- disable caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="lang-switch">
        <a href="?lang=sq">SQ</a> | <a href="?lang=en">EN</a>
      </div>
      <div class="top-contact">
        <a href="mailto:info@thur.com">info@thur.com</a> |
        <a href="https://instagram.com/thurbags" target="_blank">@thurbags</a>
      </div>
    </div>
    
    <div class="branding">
      <h1>THUR</h1>
      <nav class="main-nav">
        <a href="index.html" data-key="home">Ballina</a>
        <a href="index.html#bags" data-key="bags">Çantat</a>
        <a href="index.html#contact" data-key="contactNav">Kontakt</a>
        <a href="basket.html">Basket</a>
      </nav>
      <span class="cart-status">Basket: <span id="cart-count">0</span></span>
      <button id="view-basket" class="view-basket">View Basket</button>
    </div>
  </header>
  <main class="bag-detail">
    <div class="bag-images">
      <img id="mainImage" class="main-image" src="img/bag3-1.jpeg" alt="Boho Shoulder">
      <div class="thumbnails">
        <img class="thumb" src="img/bag3-1.jpeg" alt="Boho Shoulder">
        <img class="thumb" src="img/bag3-2.jpeg" alt="Boho Shoulder">
        <img class="thumb" src="img/bag3-3.jpeg" alt="Boho Shoulder">
      </div>
    </div>
    <div class="bag-info">
      <h1>Boho Shoulder</h1>
      <p>Price: $40</p>
      <button class="add-to-cart">Add to Basket</button>
      <h2 data-key="sectionContactTitle">Na Kontaktoni</h2>
      <p data-key="sectionContactText">
        Pyetje ose porosi të personalizuara? Na kontaktoni në email
        <a href="mailto:info@thur.com">info@thur.com</a>
      </p>
    </div>
  </main>

   <footer class="site-footer">
    <p>&copy; 2025 THUR</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.thumb').forEach(img =>
        img.addEventListener('click', () =>
          document.getElementById('mainImage').src = img.src
        )
      );
    });
  </script>
</body>
</html>

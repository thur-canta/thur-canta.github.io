<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shporta – Thur Handmade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">

  <div id="site-header"></div>

  <main class="cart-page">
    <div class="container">
      <h1>Shporta juaj</h1>

      <!-- Kur shporta është bosh -->
      <div id="cart-empty" class="empty-msg" style="display:none">
        <p>Shporta juaj është bosh.</p>
        <p><a href="dyqani.html"> <- Shikoni çantat tona</a></p>
      </div>

      <!-- Përmbajtja e shportës -->
      <div id="cart-content">
        <div id="cart-items"></div>

        <div class="cart-summary">
          <div class="cart-summary-row">
            <span>Nëntotali</span>
            <span id="c-subtotal">0.00€</span>
          </div>
          <div class="cart-summary-row">
            <span>Transporti</span>
            <span id="c-shipping">0.00€</span>
          </div>
          <div class="cart-summary-row total">
            <span>Totali</span>
            <span id="c-total">0.00€</span>
          </div>
          <div class="cart-actions">
            <a href="dyqani.html" class="btn btn-outline"> <- Vazhdo blerjen</a>
            <a href="porosia.html" class="btn btn-primary">Përfundo porosinë -></a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
